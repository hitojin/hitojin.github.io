<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="楽天市場の商品価格を毎日比較し、値下げ額の大きい商品をランキング形式で紹介します。"
    >

    <title>
        今日の楽天値下げランキング
    </title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            background: #f4f6f8;
            color: #222222;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "Yu Gothic",
                "Hiragino Kaku Gothic ProN",
                Meiryo,
                sans-serif;
            line-height: 1.6;
        }

        .site-header {
            background:
                linear-gradient(
                    135deg,
                    #bf0000,
                    #e60012
                );
            color: #ffffff;
            padding: 36px 20px 32px;
            text-align: center;
        }

        .site-header h1 {
            margin: 0;
            font-size: clamp(
                24px,
                5vw,
                42px
            );
            line-height: 1.25;
        }

        .site-description {
            max-width: 760px;
            margin: 14px auto 0;
            font-size: 15px;
            opacity: 0.95;
        }

        .updated-at {
            margin-top: 12px;
            font-size: 13px;
            opacity: 0.85;
        }

        .container {
            width: min(
                100% - 24px,
                1000px
            );
            margin: 28px auto 60px;
        }

        .ranking-summary {
            margin-bottom: 20px;
            padding: 18px 20px;
            border-radius: 14px;
            background: #ffffff;
            box-shadow:
                0 4px 16px
                rgba(0, 0, 0, 0.06);
        }

        .ranking-summary strong {
            color: #bf0000;
        }

        .ranking-card {
            position: relative;
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 20px;
            margin-bottom: 18px;
            padding: 24px;
            border-radius: 16px;
            background: #ffffff;
            box-shadow:
                0 6px 20px
                rgba(0, 0, 0, 0.07);
        }

        .rank-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90px;
            border-radius: 14px;
            background: #f1f3f5;
            color: #333333;
            font-size: 21px;
            font-weight: 700;
            text-align: center;
        }

        .rank-first .rank-badge {
            background:
                linear-gradient(
                    135deg,
                    #fff2a8,
                    #f6c945
                );
        }

        .rank-second .rank-badge {
            background:
                linear-gradient(
                    135deg,
                    #f4f4f4,
                    #c8c8c8
                );
        }

        .rank-third .rank-badge {
            background:
                linear-gradient(
                    135deg,
                    #f3c19b,
                    #c77a3b
                );
            color: #ffffff;
        }

        .product-name {
            margin: 0;
            font-size: 20px;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .shop-name {
            margin: 8px 0 0;
            color: #666666;
            font-size: 14px;
        }

        .price-area {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .old-price,
        .new-price {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            color: #777777;
            font-size: 13px;
        }

        .price-value {
            font-size: 22px;
            font-weight: 700;
        }

        .old-price .price-value {
            color: #777777;
            text-decoration: line-through;
        }

        .new-price .price-value {
            color: #bf0000;
        }

        .price-arrow {
            color: #999999;
            font-size: 24px;
            font-weight: 700;
        }

        .discount-area {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .discount-amount,
        .discount-rate {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            padding: 7px 13px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 700;
        }

        .discount-amount {
            background: #fff0f0;
            color: #bf0000;
        }

        .discount-rate {
            background: #fff7d6;
            color: #8a5a00;
        }

        .product-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            margin-top: 20px;
            padding: 11px 22px;
            border-radius: 10px;
            background: #bf0000;
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
            transition:
                transform 0.15s ease,
                opacity 0.15s ease;
        }

        .product-link:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .empty-ranking {
            padding: 64px 24px;
            border-radius: 18px;
            background: #ffffff;
            text-align: center;
            box-shadow:
                0 6px 20px
                rgba(0, 0, 0, 0.06);
        }

        .empty-icon {
            font-size: 54px;
        }

        .empty-ranking h2 {
            margin: 16px 0 8px;
        }

        .empty-ranking p {
            margin: 0;
            color: #666666;
        }

        .site-footer {
            padding: 28px 20px;
            background: #202124;
            color: #d7d7d7;
            text-align: center;
            font-size: 13px;
        }

        .site-footer p {
            margin: 6px 0;
        }

        @media (max-width: 640px) {
            .site-header {
                padding-top: 28px;
            }

            .container {
                width: min(
                    100% - 16px,
                    1000px
                );
                margin-top: 16px;
            }

            .ranking-card {
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 18px;
            }

            .rank-badge {
                min-height: 54px;
            }

            .product-name {
                font-size: 17px;
            }

            .price-area {
                gap: 12px;
            }

            .price-value {
                font-size: 19px;
            }

            .product-link {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <h1>
            🔥 今日の楽天値下げランキング
        </h1>

        <p class="site-description">
            楽天市場の商品価格を定期的に比較し、
            値下げ額の大きい商品をランキングで紹介します。
        </p>

        <p class="updated-at">
            最終更新：2026年07月19日 17:15
        </p>
    </header>

    <main class="container">
        <section class="ranking-summary">
            現在のランキング掲載数：
            <strong>0件</strong>
        </section>

        
        <section class="empty-ranking">
            <div class="empty-icon">
                📉
            </div>

            <h2>
                現在、値下げ商品はありません
            </h2>

            <p>
                新しい価格変更が確認されると、
                ここにランキングが表示されます。
            </p>
        </section>
    
    </main>

    <footer class="site-footer">
        <p>
            当サイトは楽天アフィリエイトを利用しています。
        </p>

        <p>
            商品価格や在庫状況は変更される場合があります。
        </p>

        <p>
            購入前に楽天市場の商品ページで
            最新情報をご確認ください。
        </p>
    </footer>
</body>
</html>
